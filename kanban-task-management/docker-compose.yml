version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: kanban_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:
